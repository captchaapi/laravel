name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*', '13.*']
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'
          - laravel: '13.*'
            testbench: '11.*'
        exclude:
          # Laravel 13 requires PHP 8.3+
          - php: '8.2'
            laravel: '13.*'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, json
          tools: composer:v2
          coverage: none

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.livewire }}-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        run: |
          composer require --dev \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run Pest
        run: vendor/bin/pest --parallel

  coverage:
    runs-on: ubuntu-latest
    name: Coverage (PHP 8.4 / Laravel 12)

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, json
          tools: composer:v2
          coverage: pcov

      - name: Install dependencies
        run: |
          composer require --dev \
            "orchestra/testbench:10.*" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run Pest with coverage gate
        run: composer test:coverage
